<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="DNTMb - Old School Online Marketing. Manchester United, Americano, Kanchanaburi."
    />
    <title>DNTMb</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page-shell" aria-label="DNTMb profile">
      <section class="intro" aria-labelledby="site-title">
        <div class="brand-row">
          <video
            class="profile-video"
            src="assets/dntmb.mp4"
            autoplay
            muted
            loop
            playsinline
            aria-label="DNTMb profile video"
          ></video>

          <h1 id="site-title" class="brand">DNTMb</h1>
        </div>

        <p class="tagline">Old School Online Marketing</p>

        <p class="interests" aria-label="Manchester United, Americano, Kanchanaburi">
          <span>Manchester United</span>
          <span>Americano</span>
          <span>Kanchanaburi</span>
        </p>

        <a
          class="facebook-link"
          href="https://www.facebook.com/donottellmyboss"
          target="_blank"
          rel="noreferrer"
          aria-label="Open DNTMb on Facebook"
        >
          <span class="facebook-mark" aria-hidden="true">f</span>
        </a>
      </section>
    </main>
  </body>
</html>
